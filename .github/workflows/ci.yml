#
# 5-stage CI/CD pipeline (ADR-003):
#   lint ──┬── test ───────────┐
#          └── security-scan ───┴── build ── integration-test (self-hosted Jetson)

name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  IMAGE: ghcr.io/saibusu/aifinal

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDM
        run: pipx install pdm
      - name: Install dependencies
        run: pdm install -d
      - name: Ruff lint
        run: pdm run ruff check src/ tests/ scripts/ conftest.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDM
        run: pipx install pdm
      - name: Install dependencies
        run: pdm install -d
      - name: Pytest with coverage gate (>= 90%)
        run: pdm run pytest

  security-scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDM
        run: pipx install pdm
      - name: Install dependencies
        run: pdm install -d
      - name: Bandit (fail on medium+ severity)
        run: pdm run bandit -r src/ scripts/ --severity-level medium
      - name: pip-audit (dependency CVEs)
        run: pdm run pip-audit
        continue-on-error: true   # report upstream CVEs without wedging the pipeline

  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on master) arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    # Real-hardware stage: camera + inference + GPIO LED on the Yahboom kit.
    # Runs only on push, on the self-hosted Jetson runner (Idle until registered).
    runs-on: [self-hosted, linux, ARM64, jetson]
    needs: build
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - name: Pull freshly built image
        run: docker pull ${{ env.IMAGE }}:sha-${{ github.sha }}
      - name: Start container
        run: |
          IMAGE_REF=${{ env.IMAGE }}:sha-${{ github.sha }} \
            docker compose -f deploy/docker-compose.yml up -d
      - name: Wait for health
        run: deploy/healthcheck.sh
      - name: Integration tests (camera + inference + GPIO)
        env:
          INTEGRATION_URL: http://localhost:8000
        run: |
          python3 -m pip install --quiet pytest
          python3 -m pytest tests/integration -v
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker-compose.yml down
